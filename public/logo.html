<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassionWork - Official Logo Asset</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .logo-preview {
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            display: block;
            border-radius: 20%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0f172a;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 10px;
        }
        p {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .download-btn {
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }
        .download-btn:active {
            transform: translateY(0);
        }
        #canvas-stage {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo_high_res.svg" alt="PassionWork Logo Preview" class="logo-preview">
        <h1>PassionWork Logo</h1>
        <p>Download the high-resolution PNG for your LinkedIn profile picture or company page.</p>
        
        <button id="download-png" class="download-btn">Download as PNG</button>
        
        <canvas id="canvas-stage" width="1024" height="1024"></canvas>
    </div>

    <script>
        document.getElementById('download-png').addEventListener('click', function() {
            const canvas = document.getElementById('canvas-stage');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                ctx.clearRect(0, 0, 1024, 1024);
                ctx.drawImage(img, 0, 0, 1024, 1024);
                
                const link = document.createElement('a');
                link.download = 'passionwork_logo_profile.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            
            img.src = '/logo_high_res.svg';
        });
    </script>
</body>
</html>
